name: Process Customer Report

on:
  push:
    paths:
      - 'uploads/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  process:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Process Excel File
      run: |
        # Use nullglob to safely check for Excel files
        shopt -s nullglob
        FILES=(uploads/*.xlsx)
        if [ ${#FILES[@]} -eq 0 ]; then
          echo "No Excel files found in uploads/ folder. Skipping processing."
          exit 0
        fi
        
        # Find the latest .xlsx file inside uploads/ directory
        INPUT_FILE=$(ls -t uploads/*.xlsx | head -n 1)
        echo "Processing file: $INPUT_FILE"
        python app.py "$INPUT_FILE"

    - name: Commit and Push Results
      run: |
        # Only run if results were generated
        if [ ! -d "downloads" ] || [ -z "$(ls -A downloads 2>/dev/null)" ]; then
          echo "No output files generated. Skipping push."
          exit 0
        fi
        
        git config --local user.name "github-actions[bot]"
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        mkdir -p results
        
        # Copy the processed excel report to results/
        cp downloads/*.xlsx results/
        git add results/
        git commit -m "Auto-generated report from GitHub Actions" || echo "No changes to commit"
        git push
